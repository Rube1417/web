<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="Ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rnhs website</title>
    <link rel="stylesheet" href="design.css">
</head>

<body>

    <section>
    <div class="login-box">
        <form action="">
            <h2>Sign Up</h2>
            <div class="input-box">
                <span class="icon"><ion-icon name="mail-open-outline"></ion-icon></span>
                <input type="email" required>
                <label>Email</label>
            </div>
            <div class="input-box">
                <span class="icon"><ion-icon name="key-outline"></ion-icon></span>
                <input type="password" required>
                <label>Password</label>
            </div>
            <div class="input-box">
                <span class="icon"><ion-icon name="text-outline"></ion-icon></span>
                <input type="age" required>
                <label>Age</label>
            </div>
            <div class="input-box">
                <span class="icon"><ion-icon name="text-outline"></ion-icon></span>
                <input type="strand" required>
                <label>Strand</label>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox"> Remember me </label>
            </div>
            <button type="submit"><a href="./login.html">Sign Up</button></a>
            <div class="signup-link">
                <p>already have an account? <a href="./login.html">Log In</a></p>
            </div>
        </form>
    </div>
    </section>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>


</body>

</html>
